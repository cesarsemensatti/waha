services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: csadv-waha_web_1
      APP_PORT: 3001
    
waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: on-failure
    restart: unless-stopped
     ports:
      - "3001:3000"
    user: "0:0"
    environment:
      - OLLAMA_BASE_URL=http://umbrel.local:11434
      - WAHA_SERVER_HOST=0.0.0.0
      - WAHA_SERVER_PORT=3001
      - WHATSAPP_SWAGGER_USERNAME=user
      - WHATSAPP_SWAGGER_PASSWORD=senha
      - WAHA_API_KEY=api_key
      - WAHA_DASHBOARD_USERNAME=user
      - WAHA_DASHBOARD_PASSWORD=senha
    networks:
      - waha-net
    volumes:
      - ${APP_DATA_DIR}/data/sessions:/app/.sessions
      - ${APP_DATA_DIR}/data/media:/app/.media

cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=tunnel_token
      - waha
    networks:
      - waha-net

networks:
  waha-net:
    driver: bridge
