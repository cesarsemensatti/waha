manifestVersion: 1
id: csadv-waha
name: WAHA1
tagline: WhatsApp HTTP API
icon: https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-waha/logo.png
category: networking
version: "1.0.0"
port: 3001
description: WhatsApp HTTP API server
developer: Cesar
website: https://github.com/devlikeapro/waha

settings:
  - id: WAHA_API_KEY
    label: WAHA API Key
    type: password
    default: api_key

  - id: DASHBOARD_USERNAME
    label: Dashboard Username
    type: text
    default: admin

  - id: DASHBOARD_PASSWORD
    label: Dashboard Password
    type: password
    default: admin

  - id: SWAGGER_USERNAME
    label: Swagger Username
    type: text
    default: admin

  - id: SWAGGER_PASSWORD
    label: Swagger Password
    type: password
    default: admin

  - id: OLLAMA_BASE_URL
    label: Ollama Base URL
    type: text
    default: http://host.docker.internal:11434

  - id: TUNNEL_TOKEN
    label: Cloudflare Tunnel Token
    type: password
